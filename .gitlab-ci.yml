include:
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.v2.gitlab-ci.yml

build-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    # On tag pipelines also push a version-tagged image for the release asset link
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
        docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

dependency-scanning:
  stage: security
  variables:
    DS_ENABLE_MANIFEST_FALLBACK: "true"
    # SBOM-based scanner — replaces legacy Gemnasium analyser
    # Introduced 17.1, enabled by default from 17.5. On 17.1.x set explicitly.
    DS_ENFORCE_NEW_ANALYZER: "true"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG

container_scanning:
  stage: security
  variables:
    CS_SEVERITY_THRESHOLD: critical
  before_script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        export CS_IMAGE="$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      else
        export CS_IMAGE="$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      fi
      echo "Scanning image: $CS_IMAGE"
  needs:
    - build-image
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
